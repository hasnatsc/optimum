<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════════════╗
  ║  security/user-management.html                                       ║
  ║  Thymeleaf page — extends layout/base                               ║
  ║                                                                      ║
  ║  Controller : UserController  GET /users                            ║
  ║  Permission : PERM_USER_VIEW  (server-side @PreAuthorize)           ║
  ╚══════════════════════════════════════════════════════════════════════╝
-->
<html th:replace="~{layout/base :: layout('User Management', ~{::section})}"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!--
  Everything inside <section> is passed to the layout's content slot.
  This includes the page body, modals, AND the page <script> block.
  They are all rendered correctly by Thymeleaf before the layout receives
  the content fragment.
-->
<section>

  <!-- ── PAGE CONTENT ─────────────────────────────────────────────── -->
  <div id="content" class="app-content">

    <!-- Breadcrumb + H1 -->
    <div th:replace="~{fragments/breadcrumb
         :: pageHeader('Security', 'User Management',
            'create, assign roles, and control access')}">
    </div>

    <div class="panel panel-inverse">
      <div class="panel-heading">
        <div class="panel-title">
          <a href="javascript:;" onclick="openCreateModal()"
             sec:authorize="hasAuthority('PERM_USER_CREATE')">
            <span class="badge btn btn-outline-success">
              <i class="fa fa-plus me-1"></i> Create User
            </span>
          </a>
        </div>
        <div class="panel-heading-btn">
          <a href="javascript:;" class="btn btn-sm btn-icon btn-default"
             data-toggle="panel-expand"><i class="fa fa-expand"></i></a>
          <a href="javascript:;" class="btn btn-sm btn-icon btn-success"
             data-toggle="panel-reload"><i class="fa fa-redo"></i></a>
          <a href="javascript:;" class="btn btn-sm btn-icon btn-warning"
             data-toggle="panel-collapse"><i class="fa fa-minus"></i></a>
        </div>
      </div>

      <div class="panel-body">
        <div class="row mb-3">
          <div class="col-md-3">
            <label class="form-label fw-semibold">Status Filter</label>
            <select id="statusFilter" class="form-select">
              <option value="">All Users</option>
              <option value="1">Active</option>
              <option value="0">Disabled</option>
            </select>
          </div>
        </div>

        <table id="userTable" width="100%"
               class="table table-striped table-bordered align-middle
                      text-nowrap dataTable dtr-inline">
          <thead>
          <tr>
            <th width="1%">SL</th>
            <th>Username</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Roles</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div><!-- /panel -->

  </div><!-- /app-content -->


  <!-- ── MODAL — CREATE / EDIT ──────────────────────────────────────── -->
  <div tabindex="-1" aria-hidden="true" id="userModal" class="modal fade">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title" id="userModalLabel">
            <i class="fa fa-user-gear text-success me-2"></i>User Form
          </h5>
          <button type="button" data-bs-dismiss="modal" class="btn-close"></button>
        </div>

        <div class="modal-body">
          <div class="hs-box">
            <!--
              th:action is NOT used here because this form is submitted via
              secureFetch() (AJAX JSON). The CSRF token is read from the
              <meta name="_csrf"> tag injected by the head fragment.
            -->
            <form id="userForm" data-parsley-validate="true">
              <input type="hidden" id="userId">

              <div class="row g-3">

                <!-- Basic Info -->
                <div class="col-12">
                  <h6 class="text-primary mb-0">
                    <i class="fa fa-id-card me-1"></i>Basic Information
                  </h6>
                  <hr class="mt-1 mb-0">
                </div>

                <div class="col-md-6">
                  <label class="form-label">
                    Username <span class="text-danger">*</span>
                  </label>
                  <input type="text" class="form-control" id="uUsername"
                         name="username" required
                         data-parsley-required="true"
                         data-parsley-minlength="3"
                         placeholder="e.g. john.doe">
                </div>

                <div class="col-md-6">
                  <label class="form-label">
                    Full Name <span class="text-danger">*</span>
                  </label>
                  <input type="text" class="form-control" id="uFullName"
                         name="fullName" required data-parsley-required="true"
                         placeholder="e.g. John Doe">
                </div>

                <div class="col-md-6">
                  <label class="form-label">
                    Email <span class="text-danger">*</span>
                  </label>
                  <input type="email" class="form-control" id="uEmail"
                         name="email" required data-parsley-required="true"
                         data-parsley-type="email"
                         placeholder="user@company.com">
                </div>

                <div class="col-md-6">
                  <label class="form-label">Phone</label>
                  <input type="text" class="form-control" id="uPhone"
                         name="phone" placeholder="+880…">
                </div>

                <!-- Password -->
                <div class="col-12">
                  <h6 class="text-warning mb-0 mt-1">
                    <i class="fa fa-lock me-1"></i>Password
                    <small class="text-muted fw-normal" id="pwHint">
                      — required for new user
                    </small>
                  </h6>
                  <hr class="mt-1 mb-0">
                </div>

                <div class="col-md-6">
                  <label class="form-label">
                    Password <span class="text-danger" id="pwRequired">*</span>
                  </label>
                  <div class="input-group">
                    <input type="password" class="form-control" id="uPassword"
                           name="password" placeholder="Min 8 characters"
                           data-parsley-minlength="8"
                           data-parsley-minlength-message="Minimum 8 characters.">
                    <button type="button" class="btn btn-outline-secondary"
                            id="pwToggle1">
                      <i class="fa fa-eye" id="pwIcon1"></i>
                    </button>
                  </div>
                </div>

                <div class="col-md-6">
                  <label class="form-label">
                    Confirm Password
                    <span class="text-danger" id="cpRequired">*</span>
                  </label>
                  <div class="input-group">
                    <input type="password" class="form-control"
                           id="uConfirmPassword"
                           placeholder="Repeat password"
                           data-parsley-equalto="#uPassword"
                           data-parsley-equalto-message="Passwords do not match.">
                    <button type="button" class="btn btn-outline-secondary"
                            id="pwToggle2">
                      <i class="fa fa-eye" id="pwIcon2"></i>
                    </button>
                  </div>
                </div>

                <!-- Roles & Dashboard -->
                <div class="col-12">
                  <h6 class="text-info mb-0 mt-1">
                    <i class="fa fa-shield-halved me-1"></i>Roles &amp; Access
                  </h6>
                  <hr class="mt-1 mb-0">
                </div>

                <div class="col-md-8">
                  <label class="form-label">
                    Assign Roles <span class="text-danger">*</span>
                  </label>
                  <select class="form-select" id="uRoleIds" name="roleIds"
                          multiple required data-parsley-required="true"
                          data-parsley-errors-container="#roleError">
                  </select>
                  <div id="roleError"></div>
                </div>

                <div class="col-md-4">
                  <label class="form-label">Default Dashboard</label>
                  <select class="form-select" id="uDefaultDashboard"
                          name="defaultDashboard">
                    <option value="DEFAULT">Default</option>
                    <option value="PRODUCTION">Production</option>
                    <option value="INVENTORY">Inventory</option>
                    <option value="COMMERCIAL">Commercial</option>
                    <option value="HR">HR</option>
                    <option value="FINANCE">Finance</option>
                  </select>
                </div>

                <!-- Account Flags -->
                <div class="col-12">
                  <h6 class="text-secondary mb-0 mt-1">
                    <i class="fa fa-sliders me-1"></i>Account Flags
                  </h6>
                  <hr class="mt-1 mb-0">
                </div>

                <div class="col-12 d-flex flex-wrap gap-4">
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox"
                           id="uEnabled" name="enabled" checked>
                    <label class="form-check-label fw-semibold"
                           for="uEnabled">Enabled</label>
                  </div>
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox"
                           id="uAccountNonLocked" name="accountNonLocked" checked>
                    <label class="form-check-label fw-semibold"
                           for="uAccountNonLocked">Account Non-Locked</label>
                  </div>
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox"
                           id="uAccountNonExpired" name="accountNonExpired" checked>
                    <label class="form-check-label fw-semibold"
                           for="uAccountNonExpired">Account Non-Expired</label>
                  </div>
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox"
                           id="uCredNonExpired" name="credentialsNonExpired" checked>
                    <label class="form-check-label fw-semibold"
                           for="uCredNonExpired">Credentials Non-Expired</label>
                  </div>
                </div>

              </div><!-- /row -->
            </form>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" data-bs-dismiss="modal" class="btn btn-white">
            Close
          </button>
          <button type="submit" form="userForm" id="userSubmitBtn"
                  class="btn btn-success">
            <span id="userSpinner"
                  class="spinner-border spinner-border-sm d-none"
                  role="status"></span>
            <span id="userBtnText">Save</span>
          </button>
        </div>
      </div>
    </div>
  </div><!-- /userModal -->


  <!-- ── MODAL — VIEW ───────────────────────────────────────────────── -->
  <div tabindex="-1" aria-hidden="true" id="userModalShow" class="modal fade">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">
            <i class="fa fa-user text-success me-2"></i>User Details
          </h5>
          <button type="button" data-bs-dismiss="modal" class="btn-close"></button>
        </div>
        <div class="modal-body">
          <div class="hs-box">
            <div class="row g-3">

              <div class="col-12">
                <div class="alert alert-info text-center mb-0 py-2">
                  <strong id="sv_username">—</strong>
                  <span id="sv_statusBadge" class="badge ms-2">—</span>
                </div>
              </div>

              <div class="col-12">
                <h6 class="text-primary mb-0">
                  <i class="fa fa-id-card me-1"></i>Identity
                </h6>
                <hr class="mt-1 mb-0">
              </div>

              <div class="col-md-4 view-group">
                <label class="view-label">Full Name</label>
                <span id="sv_fullName" class="form-control hs_span_show"></span>
              </div>
              <div class="col-md-4 view-group">
                <label class="view-label">Email</label>
                <span id="sv_email" class="form-control hs_span_show"></span>
              </div>
              <div class="col-md-4 view-group">
                <label class="view-label">Phone</label>
                <span id="sv_phone" class="form-control hs_span_show"></span>
              </div>

              <div class="col-12">
                <h6 class="text-info mb-0 mt-1">
                  <i class="fa fa-shield-halved me-1"></i>Roles &amp; Access
                </h6>
                <hr class="mt-1 mb-0">
              </div>

              <div class="col-md-8 view-group">
                <label class="view-label">Assigned Roles</label>
                <span id="sv_roles" class="form-control hs_span_show"></span>
              </div>
              <div class="col-md-4 view-group">
                <label class="view-label">Default Dashboard</label>
                <span id="sv_dashboard" class="form-control hs_span_show"></span>
              </div>

              <div class="col-12">
                <h6 class="text-secondary mb-0 mt-1">
                  <i class="fa fa-sliders me-1"></i>Account Flags
                </h6>
                <hr class="mt-1 mb-0">
              </div>
              <div class="col-12 d-flex flex-wrap gap-3">
                <span id="sv_enabled"        class="badge fs-12px"></span>
                <span id="sv_locked"         class="badge fs-12px"></span>
                <span id="sv_accountExpired" class="badge fs-12px"></span>
                <span id="sv_credExpired"    class="badge fs-12px"></span>
              </div>

              <div class="col-12 mt-2">
                <hr class="mb-2">
                <small class="text-muted">
                  Last Login: <strong id="sv_lastLogin"></strong>
                  &nbsp;|&nbsp;
                  Created by: <strong id="sv_createdBy"></strong>
                  &nbsp;at: <span id="sv_createdAt"></span>
                  &nbsp;&nbsp;
                  Updated by: <strong id="sv_updatedBy"></strong>
                  &nbsp;at: <span id="sv_updatedAt"></span>
                </small>
              </div>

            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" data-bs-dismiss="modal" class="btn btn-white">
            Close
          </button>
        </div>
      </div>
    </div>
  </div><!-- /userModalShow -->


  <!-- ════════════════════════════════════════════════════════════════
       PAGE SCRIPTS
       All JS is consolidated here, inside <section>, so Thymeleaf
       passes it to the layout together with the HTML above.
  ════════════════════════════════════════════════════════════════════ -->
  <script>

  /* ── DataTable ───────────────────────────────────────────────────── */
  let userDT;

  document.addEventListener('DOMContentLoaded', function () {
      userDT = $('#userTable').DataTable({
          processing: true,
          responsive: true,
          serverSide: true,
          ajax: {
              url:  '/users/list',
              type: 'GET',
              data: function (d) {
                  d.statusFilter = document.getElementById('statusFilter')?.value || '';
              }
          },
          columns: [
              { data: 'sl',       orderable: false, width: '3%' },
              { data: 'username'                                 },
              { data: 'full_name'                                },
              { data: 'email'                                    },
              { data: 'phone'                                    },
              { data: 'roles',    orderable: false               },
              { data: 'status',   orderable: false               },
              { data: 'actions',  orderable: false               }
          ]
      });

      document.getElementById('statusFilter')
              .addEventListener('change', () => userDT.ajax.reload());

      initUserForm();
      initPwToggles();
      initRolesSelect2();
  });


  /* ── Roles Select2 ───────────────────────────────────────────────── */
  function initRolesSelect2(preselect) {
      const $sel = $('#uRoleIds');
      if ($sel.hasClass('select2-hidden-accessible')) $sel.select2('destroy');

      $sel.select2({
          dropdownParent:     $('#userModal'),
          width:              '100%',
          placeholder:        '— Search and select roles —',
          allowClear:         true,
          minimumInputLength: 0,
          ajax: {
              url:      '/users/roles/search',
              dataType: 'json',
              delay:    200,
              data:     params => ({ search: params.term || '' }),
              processResults: data => ({
                  results: data.map(r => ({ id: r.id, text: r.text }))
              }),
              cache: true
          },
          templateResult:    r => r.loading ? r.text : $(`<div><strong>${r.text}</strong></div>`),
          templateSelection: r => r.text || r.id
      });

      if (preselect?.roleIds?.length) {
          const names = (preselect.roleNames || '').split(', ');
          preselect.roleIds.forEach((id, i) => {
              $sel.append(new Option(names[i] || id, id, true, true));
          });
          $sel.trigger('change');
      }
  }


  /* ── Form reset ──────────────────────────────────────────────────── */
  function resetUserForm() {
      const form = document.getElementById('userForm');
      if (form) form.reset();
      const id = document.getElementById('userId');
      if (id) id.value = '';
      const $r = $('#uRoleIds');
      if ($r.hasClass('select2-hidden-accessible')) $r.val(null).trigger('change');
      ['uEnabled','uAccountNonLocked','uAccountNonExpired','uCredNonExpired']
          .forEach(elId => {
              const el = document.getElementById(elId);
              if (el) el.checked = true;
          });
  }


  /* ── Form submit ─────────────────────────────────────────────────── */
  function initUserForm() {
      const form      = document.getElementById('userForm');
      const submitBtn = document.getElementById('userSubmitBtn');
      const spinner   = document.getElementById('userSpinner');
      const btnText   = document.getElementById('userBtnText');

      if (!form) return;

      window.Parsley.on('field:error',   function () { this.$element.addClass('is-invalid'); });
      window.Parsley.on('field:success', function () { this.$element.removeClass('is-invalid'); });

      form.addEventListener('submit', function (e) {
          e.preventDefault();
          if (!$(form).parsley().isValid()) return;

          const isEdit  = !!document.getElementById('userId')?.value;
          const pwValue = document.getElementById('uPassword')?.value.trim();

          if (!isEdit && !pwValue) {
              Swal.fire('Validation', 'Password is required for new users.', 'warning');
              return;
          }

          const roleIds = $('#uRoleIds').val();
          if (!roleIds?.length) {
              Swal.fire('Validation', 'Please assign at least one role.', 'warning');
              return;
          }

          hsDisableButton(submitBtn, spinner, btnText);

          const payload = {
              id:                    document.getElementById('userId')?.value || null,
              username:              document.getElementById('uUsername')?.value.trim(),
              fullName:              document.getElementById('uFullName')?.value.trim(),
              email:                 document.getElementById('uEmail')?.value.trim(),
              phone:                 document.getElementById('uPhone')?.value.trim() || null,
              password:              pwValue || null,
              enabled:               document.getElementById('uEnabled')?.checked ?? true,
              accountNonLocked:      document.getElementById('uAccountNonLocked')?.checked ?? true,
              accountNonExpired:     document.getElementById('uAccountNonExpired')?.checked ?? true,
              credentialsNonExpired: document.getElementById('uCredNonExpired')?.checked ?? true,
              defaultDashboard:      document.getElementById('uDefaultDashboard')?.value || 'DEFAULT',
              roleIds:               roleIds.map(Number)
          };

          secureFetch('/users/save', { method: 'POST', body: JSON.stringify(payload) })
              .then(data => {
                  hsEnableButton(submitBtn, spinner, btnText);
                  if (data.success) {
                      Swal.fire({ icon: 'success', title: 'Saved!', text: data.message,
                                  timer: 2000, showConfirmButton: false });
                      bootstrap.Modal.getOrCreateInstance(
                          document.getElementById('userModal')).hide();
                      userDT.ajax.reload();
                  } else {
                      Swal.fire({ icon: 'error', title: 'Error!', text: data.message });
                  }
              })
              .catch(err => {
                  hsEnableButton(submitBtn, spinner, btnText);
                  Swal.fire({ icon: 'error', title: 'Error!', text: err.message });
              });
      });
  }


  /* ── Open create modal ───────────────────────────────────────────── */
  function openCreateModal() {
      resetUserForm();

      const label = document.getElementById('userModalLabel');
      if (label) label.innerHTML =
          '<i class="fa fa-user-plus text-success me-2"></i>Create User';

      const pwd = document.getElementById('uPassword');
      if (pwd) { pwd.setAttribute('required',''); pwd.setAttribute('data-parsley-required','true'); }
      const conf = document.getElementById('uConfirmPassword');
      if (conf) conf.setAttribute('required','');

      const hint = document.getElementById('pwHint');
      if (hint)  hint.textContent = ' — required for new user';
      const pwReq = document.getElementById('pwRequired');
      if (pwReq) pwReq.style.display = 'inline';
      const cpReq = document.getElementById('cpRequired');
      if (cpReq) cpReq.style.display = 'inline';

      initRolesSelect2(null);
      bootstrap.Modal.getOrCreateInstance(document.getElementById('userModal')).show();
  }


  /* ── Action handlers (names match Java buildActionButtons()) ─────── */

  function dataEdit(id) {
      secureFetch('/users/show/' + id).then(data => {
          if (!data.success) { Swal.fire('Error', data.message, 'error'); return; }
          const u = data.obj.defaultData;

          resetUserForm();
          const label = document.getElementById('userModalLabel');
          if (label) label.innerHTML =
              '<i class="fa fa-pen-to-square text-warning me-2"></i>Edit User';

          const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val ?? ''; };
          const chk = (id, val) => { const el = document.getElementById(id); if (el) el.checked = !!val; };

          set('userId',            u.id);
          set('uUsername',         u.username);
          set('uFullName',         u.fullName);
          set('uEmail',            u.email);
          set('uPhone',            u.phone || '');
          set('uDefaultDashboard', u.defaultDashboard || 'DEFAULT');

          chk('uEnabled',           u.enabled);
          chk('uAccountNonLocked',  u.accountNonLocked);
          chk('uAccountNonExpired', u.accountNonExpired);
          chk('uCredNonExpired',    u.credentialsNonExpired);

          const pwd  = document.getElementById('uPassword');
          if (pwd)  { pwd.removeAttribute('required'); pwd.removeAttribute('data-parsley-required'); }
          const conf = document.getElementById('uConfirmPassword');
          if (conf)  conf.removeAttribute('required');

          const hint  = document.getElementById('pwHint');
          if (hint)   hint.textContent = ' — leave blank to keep current';
          const pwReq = document.getElementById('pwRequired');
          if (pwReq)  pwReq.style.display = 'none';
          const cpReq = document.getElementById('cpRequired');
          if (cpReq)  cpReq.style.display = 'none';

          initRolesSelect2({ roleIds: u.roleIds, roleNames: u.roleNames });
          bootstrap.Modal.getOrCreateInstance(document.getElementById('userModal')).show();
      });
  }

  function dataShow(id) {
      secureFetch('/users/show/' + id).then(data => {
          if (!data.success) { Swal.fire('Error', data.message, 'error'); return; }
          populateViewModal(data.obj.defaultData);
          bootstrap.Modal.getOrCreateInstance(
              document.getElementById('userModalShow')).show();
      });
  }

  function populateViewModal(u) {
      hsSetText('sv_username', u.username || '—');

      const badge = document.getElementById('sv_statusBadge');
      if (badge) {
          badge.textContent = u.enabled ? 'Active' : 'Disabled';
          badge.className   = 'badge ms-2 ' + (u.enabled ? 'bg-success' : 'bg-secondary');
      }

      hsSetText('sv_fullName',  u.fullName         || '—');
      hsSetText('sv_email',     u.email            || '—');
      hsSetText('sv_phone',     u.phone            || '—');
      hsSetText('sv_roles',     u.roleNames        || 'No Role');
      hsSetText('sv_dashboard', u.defaultDashboard || 'DEFAULT');
      hsSetText('sv_lastLogin', u.lastLoginAt      || 'Never');
      hsSetText('sv_createdBy', u.createdBy        || '—');
      hsSetText('sv_createdAt', u.createdAt        || '—');
      hsSetText('sv_updatedBy', u.updatedBy        || '—');
      hsSetText('sv_updatedAt', u.updatedAt        || '—');

      _flagBadge('sv_enabled',        u.enabled,               'Enabled',           'Disabled');
      _flagBadge('sv_locked',         u.accountNonLocked,      'Account Unlocked',  'Account Locked');
      _flagBadge('sv_accountExpired', u.accountNonExpired,     'Account Valid',     'Account Expired');
      _flagBadge('sv_credExpired',    u.credentialsNonExpired, 'Credentials Valid', 'Credentials Expired');
  }

  function _flagBadge(id, condition, trueLabel, falseLabel) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = condition ? trueLabel : falseLabel;
      el.className   = 'badge fs-12px ' + (condition ? 'bg-success' : 'bg-danger');
  }

  function dataDelete(id) {
      confirmAndExecute({
          title:        'Delete User?',
          text:         'Soft-delete. The last Super Admin cannot be deleted.',
          icon:         'warning',
          confirmText:  'Yes, delete!',
          confirmColor: '#d33',
          url:          `/users/delete/${id}`,
          method:       'DELETE',
          successTitle: 'Deleted!',
          reloadTable:  true,
          dataTable:    userDT
      });
  }

  function dataToggle(id) {
      hsChangeStatus('/users/toggle-status/' + id, userDT, 'User');
  }

  function dataPwd(id) {
      Swal.fire({
          title: 'Set New Password',
          html: `
              <div style="text-align:left;margin-top:10px;">
                  <div class="mb-3 position-relative">
                      <input type="password" id="newPwd1" class="swal2-input"
                             placeholder="New password (min 8 chars)" style="width:90%">
                      <i class="fa fa-eye position-absolute" id="e1"
                         style="right:20px;top:50%;transform:translateY(-50%);cursor:pointer;color:#999;"
                         onclick="toggleSwalPw('newPwd1','e1')"></i>
                  </div>
                  <div class="mb-1 position-relative">
                      <input type="password" id="newPwd2" class="swal2-input"
                             placeholder="Confirm password" style="width:90%">
                      <i class="fa fa-eye position-absolute" id="e2"
                         style="right:20px;top:50%;transform:translateY(-50%);cursor:pointer;color:#999;"
                         onclick="toggleSwalPw('newPwd2','e2')"></i>
                  </div>
              </div>`,
          showCancelButton:   true,
          confirmButtonColor: '#17a2b8',
          confirmButtonText:  'Update Password',
          focusConfirm:       false,
          preConfirm: () => {
              const p1 = document.getElementById('newPwd1')?.value;
              const p2 = document.getElementById('newPwd2')?.value;
              if (!p1)         { Swal.showValidationMessage('Password is required.');  return false; }
              if (p1.length<8) { Swal.showValidationMessage('Minimum 8 characters.'); return false; }
              if (p1 !== p2)   { Swal.showValidationMessage('Passwords do not match.');return false; }
              return p1;
          }
      }).then(result => {
          if (!result.isConfirmed) return;
          secureFetch(`/users/change-password/${id}`, {
              method: 'POST',
              body:   JSON.stringify({ password: result.value })
          }).then(data => {
              Swal.fire({
                  icon:  data.success ? 'success' : 'error',
                  title: data.success ? 'Done!'   : 'Error!',
                  text:  data.message,
                  timer: data.success ? 2000 : undefined,
                  showConfirmButton: !data.success
              });
          });
      });
  }

  function toggleSwalPw(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon  = document.getElementById(iconId);
      if (!input || !icon) return;
      const show     = input.type === 'password';
      input.type     = show ? 'text' : 'password';
      icon.className = (show ? 'fa fa-eye-slash' : 'fa fa-eye') + ' position-absolute';
  }


  /* ── Password toggles in the form modal ─────────────────────────── */
  function initPwToggles() {
      [ ['pwToggle1','uPassword','pwIcon1'],['pwToggle2','uConfirmPassword','pwIcon2'] ]
          .forEach(([btnId, inputId, iconId]) => {
              const btn = document.getElementById(btnId);
              if (!btn) return;
              btn.addEventListener('click', () => {
                  const inp  = document.getElementById(inputId);
                  const icon = document.getElementById(iconId);
                  if (!inp || !icon) return;
                  const show     = inp.type === 'password';
                  inp.type       = show ? 'text' : 'password';
                  icon.className = show ? 'fa fa-eye-slash' : 'fa fa-eye';
              });
          });
  }

  </script>

</section>
</html>
