<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  FRAGMENT  fragments/topMenuHeader :: topMenuHeader          ║
  ║                                                              ║
  ║  Usage:                                                      ║
  ║    <div th:replace="~{fragments/topMenuHeader               ║
  ║         :: topMenuHeader}"></div>                            ║
  ║                                                              ║
  ║  Requires in pom.xml:                                        ║
  ║    thymeleaf-extras-springsecurity6                          ║
  ║  (for sec:authorize, sec:authentication attributes)          ║
  ╚══════════════════════════════════════════════════════════════╝
-->
<body>

<div th:fragment="topMenuHeader" id="topMenuHeader" class="app-header">

  <!-- ── Brand ─────────────────────────────────────────────────────── -->
  <div class="navbar-header">
    <a th:href="@{/dashboard}" class="navbar-brand">
      <span class="navbar-logo"></span>
      <b class="me-3px">Spindles</b> ERP
    </a>
    <button type="button" class="navbar-mobile-toggler"
            data-toggle="app-top-menu-mobile">
      <span class="icon-bar"></span>
      <span class="icon-bar"></span>
      <span class="icon-bar"></span>
    </button>
  </div>

  <!-- ── Nav items ─────────────────────────────────────────────────── -->
  <div class="navbar-nav">

    <!-- Context Switchers (populated by JS via /user-context/allowed/context) -->
    <div class="navbar-item dropdown" id="contextSwitchers">

      <div class="dropdown d-inline-block me-2">
        <button class="btn btn-sm btn-outline-theme dropdown-toggle" type="button"
                id="orgDropdown" data-bs-toggle="dropdown">
          <i class="fa fa-building"></i>
          <span id="currentOrgName">Organization</span>
        </button>
        <ul class="dropdown-menu" id="orgList">
          <li><a class="dropdown-item disabled">Loading…</a></li>
        </ul>
      </div>

      <div class="dropdown d-inline-block me-2">
        <button class="btn btn-sm btn-outline-theme dropdown-toggle" type="button"
                id="buDropdown" data-bs-toggle="dropdown">
          <i class="fa fa-briefcase"></i>
          <span id="currentBuName">Business Unit</span>
        </button>
        <ul class="dropdown-menu" id="buList">
          <li><a class="dropdown-item disabled">Loading…</a></li>
        </ul>
      </div>

      <div class="dropdown d-inline-block me-2">
        <button class="btn btn-sm btn-outline-theme dropdown-toggle" type="button"
                id="ccDropdown" data-bs-toggle="dropdown">
          <i class="fa fa-chart-pie"></i>
          <span id="currentCcName">Cost Center</span>
        </button>
        <ul class="dropdown-menu" id="ccList">
          <li><a class="dropdown-item disabled">Loading…</a></li>
        </ul>
      </div>

      <div class="dropdown d-inline-block me-2">
        <button class="btn btn-sm btn-outline-theme dropdown-toggle" type="button"
                id="whDropdown" data-bs-toggle="dropdown">
          <i class="fa fa-warehouse"></i>
          <span id="currentWhName">Warehouse</span>
        </button>
        <ul class="dropdown-menu" id="whList">
          <li><a class="dropdown-item disabled">Loading…</a></li>
        </ul>
      </div>

    </div><!-- /contextSwitchers -->

    <!-- Search -->
    <div class="navbar-item navbar-form">
      <div class="form-group">
        <input type="text" class="form-control" placeholder="Enter keyword"/>
        <button type="button" class="btn btn-search">
          <i class="fa fa-search"></i>
        </button>
      </div>
    </div>

    <!-- Notifications -->
    <div class="navbar-item dropdown">
      <a href="#" data-bs-toggle="dropdown"
         class="navbar-link dropdown-toggle icon">
        <i class="fa fa-bell"></i>
        <span class="badge" id="notificationCount">0</span>
      </a>
      <div class="dropdown-menu media-list dropdown-menu-end">
        <div class="dropdown-header">NOTIFICATIONS</div>
        <div class="p-3 text-muted small text-center" id="notificationList">
          No new notifications
        </div>
        <div class="dropdown-footer text-center">
          <a th:href="@{/notifications}" class="text-decoration-none">View all</a>
        </div>
      </div>
    </div>

    <!-- User menu -->
    <div class="navbar-item navbar-user dropdown">
      <a href="#" class="navbar-link dropdown-toggle d-flex align-items-center"
         data-bs-toggle="dropdown">

        <!-- Avatar: initials fallback -->
        <span class="d-inline-flex align-items-center justify-content-center
                      rounded-circle bg-theme text-white fw-bold me-2"
              style="width:30px;height:30px;font-size:13px;"
              sec:authentication="principal.fullName"
              th:text="${#strings.substring(
                           #authentication.principal.fullName != null
                             ? #authentication.principal.fullName
                             : #authentication.name,
                           0, 1).toUpperCase()}">
          U
        </span>

        <span>
          <!--
            Show fullName if available (CustomUserDetails.getFullName()),
            fall back to username (principal.username / getName()).
          -->
          <span class="d-none d-md-inline"
                th:text="${#authentication.principal.fullName
                           ?: #authentication.name}">
            User
          </span>
          <b class="caret"></b>
        </span>
      </a>

      <div class="dropdown-menu dropdown-menu-end me-1">
        <a th:href="@{/profile}" class="dropdown-item">
          <i class="fa fa-user-circle me-2 text-muted"></i>Edit Profile
        </a>
        <a th:href="@{/inbox}" class="dropdown-item d-flex align-items-center">
          <i class="fa fa-inbox me-2 text-muted"></i>Inbox
          <span class="badge bg-danger rounded-pill ms-auto pb-4px">2</span>
        </a>
        <a th:href="@{/calendar}" class="dropdown-item">
          <i class="fa fa-calendar me-2 text-muted"></i>Calendar
        </a>
        <a href="javascript:;" class="dropdown-item" id="changePasswordBtn">
          <i class="fa fa-key me-2 text-muted"></i>Change Password
        </a>

        <div class="dropdown-divider"></div>

        <!--
          Logout form — th:action + th:csrf ensure the CSRF hidden field
          is injected automatically by Thymeleaf Spring Security.
        -->
        <form th:action="@{/logout}" method="post" class="d-inline">
          <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}">
          <button type="submit" class="dropdown-item text-danger">
            <i class="fa fa-right-from-bracket me-2"></i>Log Out
          </button>
        </form>
      </div>
    </div><!-- /navbar-user -->

  </div><!-- /navbar-nav -->


  <!-- ── Inline scripts ────────────────────────────────────────────────
       These live inside the fragment so they are included once per page
       via th:replace. No separate script import needed.
  ─────────────────────────────────────────────────────────────────────→ -->

  <!-- Change Password -->
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    const btn = document.getElementById('changePasswordBtn');
    if (!btn) return;

    btn.addEventListener('click', function () {
      const csrfToken  = document.querySelector('meta[name="_csrf"]')?.content;
      const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;

      Swal.fire({
        title: 'Change Password',
        html: `
          <div style="display:flex;flex-direction:column;gap:12px;margin-top:10px;">
            <div style="position:relative;">
              <input type="password" id="swNewPwd" placeholder="New Password"
                style="width:100%;padding:12px 40px 12px 15px;border-radius:8px;
                       border:1px solid #ccc;font-size:14px;">
              <i class="fa fa-eye" id="togNewPwd"
                style="position:absolute;right:12px;top:50%;
                       transform:translateY(-50%);cursor:pointer;color:#666;"></i>
            </div>
            <div style="position:relative;">
              <input type="password" id="swConfPwd" placeholder="Confirm Password"
                style="width:100%;padding:12px 40px 12px 15px;border-radius:8px;
                       border:1px solid #ccc;font-size:14px;">
              <i class="fa fa-eye" id="togConfPwd"
                style="position:absolute;right:12px;top:50%;
                       transform:translateY(-50%);cursor:pointer;color:#666;"></i>
            </div>
          </div>`,
        showCancelButton:  true,
        confirmButtonText: 'Update',
        focusConfirm:      false,
        didOpen: () => {
          document.getElementById('togNewPwd').addEventListener('click', () => {
            const el = document.getElementById('swNewPwd');
            el.type  = el.type === 'password' ? 'text' : 'password';
          });
          document.getElementById('togConfPwd').addEventListener('click', () => {
            const el = document.getElementById('swConfPwd');
            el.type  = el.type === 'password' ? 'text' : 'password';
          });
        },
        preConfirm: () => {
          const p1 = document.getElementById('swNewPwd')?.value;
          const p2 = document.getElementById('swConfPwd')?.value;
          if (!p1 || !p2)  { Swal.showValidationMessage('All fields required'); return false; }
          if (p1.length<6) { Swal.showValidationMessage('Minimum 6 characters'); return false; }
          if (p1 !== p2)   { Swal.showValidationMessage('Passwords do not match'); return false; }
          return p1;
        }
      }).then(r => {
        if (!r.isConfirmed) return;
        fetch('/openApi/menus/change-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json', [csrfHeader]: csrfToken },
          body:    JSON.stringify({ password: r.value })
        })
        .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
        .then(() => Swal.fire({ icon: 'success', title: 'Success', text: 'Password updated.' }))
        .catch(() => Swal.fire({ icon: 'error',   title: 'Error',   text: 'Update failed.' }));
      });
    });
  });
  </script>

  <!-- Context Switchers -->
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    const csrfToken  = document.querySelector('meta[name="_csrf"]')?.content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;
    let ctx = {};

    function loadContext() {
      secureFetch('/user-context/allowed/context')
        .then(data => { ctx = data.current || {}; renderCtx(ctx); renderDropdowns(data); })
        .catch(e => console.error('[Context] load failed', e));
    }

    function renderCtx(c) {
      setText('currentOrgName', c.organizationName || 'Organization');
      setText('currentBuName',  c.businessUnitName || 'Business Unit');
      setText('currentCcName',  c.costCenterName   || 'Cost Center');
      setText('currentWhName',  c.warehouseName    || 'Warehouse');
    }

    function renderDropdowns(data) {
      renderList('orgList', data.organizations, ctx.organizationId, id => doSwitch('/user-context/switch/organization/'  + id));
      renderList('buList',  data.businessUnits, ctx.businessUnitId, id => doSwitch('/user-context/switch/business-unit/' + id));
      renderList('ccList',  data.costCenters,   ctx.costCenterId,   id => doSwitch('/user-context/switch/cost-center/'   + id));
      renderList('whList',  data.warehouses,    ctx.warehouseId,    id => doSwitch('/user-context/switch/warehouse/'     + id));
    }

    function renderList(listId, items, selectedId, handler) {
      const ul = document.getElementById(listId);
      if (!ul) return;
      ul.innerHTML = '';
      if (!items || !items.length) {
        ul.innerHTML = '<li><a class="dropdown-item disabled">None available</a></li>';
        return;
      }
      items.forEach(item => {
        const li = document.createElement('li');
        const a  = document.createElement('a');
        a.className   = 'dropdown-item';
        a.href        = '#';
        a.innerHTML   = item.code + ' — ' + item.name +
          (item.id === selectedId ? ' <i class="fa fa-check text-success ms-1"></i>' : '');
        a.addEventListener('click', e => { e.preventDefault(); handler(item.id); });
        li.appendChild(a);
        ul.appendChild(li);
      });
    }

    function doSwitch(url) {
      secureFetch(url, { method: 'POST', headers: { [csrfHeader]: csrfToken } })
        .then(res => {
          if (res.success) {
            hsShowToast('success', res.message);
            loadContext();
          } else {
            hsShowToast('error', res.message);
          }
        })
        .catch(() => hsShowToast('error', 'Request failed'));
    }

    function setText(id, txt) {
      const el = document.getElementById(id);
      if (el) el.textContent = txt;
    }

    loadContext();
  });
  </script>

</div><!-- /topMenuHeader -->

</body>
</html>
